# Fox Book Store — full stack in two containers.
# Run from D:\FoxBookStore with:  docker compose up --build
# Then open http://localhost:3000

services:
  backend:
    build: ./backend
    container_name: fox-backend
    ports:
      - "8080:8080"
    volumes:
      # Persist the H2 database file outside the container.
      - backend-data:/app/data

  frontend:
    build: ./frontend
    container_name: fox-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
