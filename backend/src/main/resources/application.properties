# Fox Book Store API configuration
spring.application.name=fox-book-store-api
server.port=8080

# ---- H2 database (file-based, so data survives restarts) ----
# Data is stored under ./data/foxbookstore.mv.db relative to the backend folder.
spring.datasource.url=jdbc:h2:file:./data/foxbookstore;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Browse the database at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:file:./data/foxbookstore  user: sa  no password)
spring.h2.console.enabled=true

# CORS for the Next.js dev server is configured in WebConfig.java
